experiment:
  name: doa_regression_baseline

task:
  name: doa_regression
  params:
    theta_scan_deg: [-60, -55, -50, -45, -40, -35, -30, -25, -20, -15, -10, -5, 0, 5, 10, 15, 20, 25, 30, 35, 40, 45, 50, 55, 60]

dataset:
  n_samples: 256
  seed: 42
  feature_type: covariance_real_imag
  target_type: doa_regression
  export_path: outputs/datasets/doa_regression_baseline.npz
  sampling:
    desired_theta_deg:
      min: -60.0
      max: 60.0
    desired_snr_db:
      min: 5.0
      max: 20.0
    interference_count: [0, 2]
    interference_theta_deg:
      min: -75.0
      max: 75.0
    interference_snr_db:
      min: 0.0
      max: 15.0

split:
  train: 0.7
  val: 0.15
  test: 0.15

model:
  family: numpy
  name: ridge_regressor
  params:
    alpha: 1.0

metrics:
  - mae
  - rmse

baselines:
  - music

output:
  dir: outputs/experiments/doa_regression_baseline
  save_dataset: true
  save_model: true

env:
  feature_type: covariance_real_imag
  beam_angles_deg: [-60, -30, 0, 30, 60]
  reward_mode: gain
  episode_length: 1

scenario:
  name: doa_regression_scenario
  seed: 42
  snapshots: 256
  array:
    geometry: ula
    num_elements: 8
    spacing_lambda: 0.5
  desired_source:
    theta_deg: 10.0
    phi_deg: 0.0
    snr_db: 12.0
  interference_sources: []
  algorithm:
    name: mvdr
    diagonal_loading: 0.001
  sweep:
    theta_start_deg: -90.0
    theta_stop_deg: 90.0
    theta_num: 181
    phi_start_deg: -5.0
    phi_stop_deg: 5.0
    phi_num: 3
  output:
    directory: outputs/ml-doa-regression-sim
    save_plots: false
